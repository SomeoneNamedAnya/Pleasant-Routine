services:
  pleasant_routine_db:
    image: postgres:16
    environment:
      POSTGRES_DB: pleasant_routine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"

  liquibase-migrations:
    image: liquibase/liquibase:4.29
    depends_on:
      - pleasant_routine_db
    command:
      - --searchPath=/changesets
      - --changelog-file=master.xml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://pleasant_routine_db:5432/pleasant_routine_db
      - --username=postgres
      - --password=12345
      - update
    volumes:
      - ./migrations:/changesets
